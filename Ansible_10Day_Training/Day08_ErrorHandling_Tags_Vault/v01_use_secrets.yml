---
# This playbook reads a variable that lives in an encrypted file.
# 1) encrypt the vars file first:
#      ansible-vault encrypt v02_secrets_example.yml
# 2) then run:
#      ansible-playbook v01_use_secrets.yml --ask-vault-pass
- name: use an encrypted secret
  hosts: localhost
  vars_files:
    - v02_secrets_example.yml
  tasks:
    - name: show the secret was loaded
      debug:
        msg: "db_password length is {{ db_password | length }}"
