---
- name: install a package based on the OS facts
  hosts: all
  become: yes
  tasks:
    - name: show the OS family
      debug:
        var: ansible_os_family

    - name: install zsh only on RedHat family v8+
      dnf:
        name: zsh
        state: present
      when: ansible_os_family == "RedHat" and (ansible_distribution_major_version | int) >= 8
