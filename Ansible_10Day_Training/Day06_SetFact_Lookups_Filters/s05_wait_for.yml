---
- name: wait_for demo
  hosts: node4
  tasks:
    - name: do something first
      command: /bin/true

    - name: wait up to 15s for port 80 (ignore if not present)
      wait_for:
        port: 80
        state: started
        timeout: 15
        delay: 5
      ignore_errors: true

    - name: continue afterwards
      debug:
        msg: "moving on"
