---
- name: set_fact basics
  hosts: localhost
  tasks:
    - name: task1 - define a variable at runtime
      set_fact:
        myvar: "Hello world example"

    - name: task2 - print it (var form)
      debug:
        var: myvar

    - name: task3 - print it (msg form)
      debug:
        msg: "myvar value is: {{ myvar }}"

    - name: task4 - a simple math operation
      set_fact:
        total: "{{ 10 + 20.45 }}"

    - debug:
        var: total
